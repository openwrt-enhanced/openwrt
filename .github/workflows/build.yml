name: Build OpenWrt Enhanced for Netgear R6800

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build R6800 Firmware
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget qemu-utils

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure for R6800
        run: |
          cat > .config << 'EOF'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_netgear_r6800=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_tc-full=y
          CONFIG_PACKAGE_kmod-sched-cake=y
          CONFIG_PACKAGE_kmod-ifb=y
          CONFIG_PACKAGE_sqm-scripts=y
          CONFIG_PACKAGE_luci-app-sqm=y
          CONFIG_PACKAGE_zram-swap=n
          CONFIG_PACKAGE_htop=n
          CONFIG_PACKAGE_nano=n
          CONFIG_PACKAGE_wget-ssl=n
          EOF
          make defconfig

      - name: Download sources
        run: make download -j$(nproc) || make download -j1

      - name: Build
        run: make -j$(nproc) || make -j1 V=s

      - name: Upload sysupgrade image
        uses: actions/upload-artifact@v4
        with:
          name: r6800-firmware
          path: bin/targets/ramips/mt7621/*netgear_r6800*sysupgrade*
          retention-days: 7

      - name: Upload factory image
        uses: actions/upload-artifact@v4
        with:
          name: r6800-factory
          path: bin/targets/ramips/mt7621/*netgear_r6800*factory*
          retention-days: 7
